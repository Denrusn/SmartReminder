name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartReminder-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      # Release创建暂时禁用（gh release create有问题）
      # 每次构建后请从 Artifacts 下载 APK
