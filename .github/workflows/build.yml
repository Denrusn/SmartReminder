name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartReminder-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Create Release with APK
        if: github.ref == 'refs/heads/main'
        run: |
          cd app/build/outputs/apk/debug
          notes="## SmartReminder APK Build Complete\n\n**Build Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')\n**Commit:** ${{ github.sha }}\n\nDownload app-debug.apk below."

          gh release create "v1.${{ github.run_number }}" \
            --title "SmartReminder v1.${{ github.run_number }}" \
            --notes "$notes" \
            --repo Denrusn/SmartReminder

          gh release upload "v1.${{ github.run_number }}" app-debug.apk --repo Denrusn/SmartReminder --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
