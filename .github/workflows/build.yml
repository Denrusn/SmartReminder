name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartReminder-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      - name: Create Release with APK
        if: github.ref == 'refs/heads/main'
        working-directory: app/build/outputs/apk/debug
        run: |
          echo "Build complete" > release-notes.md
          gh release create "v1.${{ github.run_number }}" \
            --title "SmartReminder v1.${{ github.run_number }}" \
            --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Release
        if: github.ref == 'refs/heads/main'
        working-directory: app/build/outputs/apk/debug
        run: |
          gh release upload "v1.${{ github.run_number }}" app-debug.apk --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
